services:
  - type: web
    name: norfach-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://norfach.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: norfach-db
          property: connectionString

databases:
  - name: norfach-db
    databaseName: norfach
    plan: free
